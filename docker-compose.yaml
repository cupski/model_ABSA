version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: mlflow-postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow123
      POSTGRES_DB: mlflow

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data


  mlflow:
    build:
      context: .
      dockerfile: mlflow/Dockerfile

    container_name: mlflow

    restart: unless-stopped

    depends_on:
      - postgres

    ports:
      - "5000:5000"

    environment:
      AWS_ACCESS_KEY_ID: ${B2_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${B2_APPLICATION_KEY}
      MLFLOW_S3_ENDPOINT_URL: ${B2_ENDPOINT_URL}

    # --serve-artifacts default-nya TRUE di MLflow — harus di-nonaktifkan
    # eksplisit lewat --no-serve-artifacts, kalau tidak server tetap jadi
    # proxy (artifact_location experiment baru akan berupa "mlflow-artifacts:/..."
    # yang memaksa semua upload lewat tracking server / tunnel).
    # --default-artifact-root (bukan --artifacts-destination, yang hanya
    # berlaku saat proxy aktif) yang menentukan artifact_location "s3://..."
    # untuk experiment baru, sehingga client (mis. Colab) upload artifact
    # besar LANGSUNG ke B2 via boto3 — tunnel tidak dilewati file model
    # yang berukuran ratusan MB.
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://mlflow:mlflow123@postgres:5432/mlflow
      --default-artifact-root s3://${B2_BUCKET_NAME}
      --no-serve-artifacts
      --allowed-hosts "*"

volumes:

  postgres_data: