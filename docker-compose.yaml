version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: mlflow-postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow123
      POSTGRES_DB: mlflow

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data


  mlflow:
    build:
      context: .
      dockerfile: mlflow/Dockerfile

    container_name: mlflow

    restart: unless-stopped

    depends_on:
      - postgres

    ports:
      - "5000:5000"

    environment:
      AWS_ACCESS_KEY_ID: ${B2_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${B2_APPLICATION_KEY}
      MLFLOW_S3_ENDPOINT_URL: ${B2_ENDPOINT_URL}

    # --serve-artifacts sengaja TIDAK diaktifkan: tanpa flag ini, MLflow
    # server hanya mencatat metadata (path artifact, metric) lewat tunnel,
    # sedangkan client (mis. Colab) upload artifact besar LANGSUNG ke B2
    # via boto3 menggunakan kredensial B2 di atas — tunnel tidak pernah
    # dilewati file model yang berukuran ratusan MB.
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://mlflow:mlflow123@postgres:5432/mlflow
      --artifacts-destination s3://${B2_BUCKET_NAME}
      --allowed-hosts "*"

volumes:

  postgres_data: